// в”Җв”Җ Realtime мӢӨмӢңк°„ лҸҷкё°нҷ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function startRealtime(){
  if(!_sb)return;
  try{
    if(_realtimeChannel){
      try{_sb.removeChannel(_realtimeChannel);}catch(e){}
      _realtimeChannel=null;
    }
    _realtimeChannel=_sb
      .channel('clinic-rt-'+Date.now(),{config:{broadcast:{self:false}}})
      .on('postgres_changes',{event:'*',schema:'public',table:'patients'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'ledger_rows'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'happycalls'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'inpatients'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'schedule'},handleRealtimeChange)
      .subscribe(function(status){
        var el=document.querySelector('.sb-sync-time');
        if(status==='SUBSCRIBED'){
          if(el)el.textContent='мӢӨмӢңк°„ рҹҹў';
        } else {
          if(el)el.textContent='мҳӨн”„лқјмқё';
        }
      });
  }catch(e){
    console.warn('Realtime мӢңмһ‘ мӢӨнҢЁ(л¬ҙмӢң):',e.message);
  }
}

var _myChanges=new Set(); // лӮҙк°Җ м ҖмһҘн•ң IDлҠ” л¬ҙмӢң
function handleRealtimeChange(payload){
  // лӮҙк°Җ л°©кёҲ м ҖмһҘн•ң лҚ°мқҙн„°лҠ” л¬ҙмӢң (мӨ‘ліө лЎңл“ң л°©м§Җ)
  var newId=payload.new&&payload.new.id;
  if(newId&&_myChanges.has(newId)){
    _myChanges.delete(newId);
    return;
  }
  console.log('рҹ”„ лӢӨлҘё кё°кё°м—җм„ң ліҖкІҪ к°җм§Җ:', payload.table, payload.eventType);
  // л””л°”мҡҙмҠӨ: 500ms лӮҙ м—¬лҹ¬ ліҖкІҪмқҖ н•ңлІҲл§Ң мІҳлҰ¬
  if(_reloadTimer) clearTimeout(_reloadTimer);
  _reloadTimer=setTimeout(function(){
    sbLoadAll().then(function(){
      render();
      // нҶ мҠӨнҠё м•ҢлҰј (л„Ҳл¬ҙ мһҗмЈј лңЁм§Җ м•ҠлҸ„лЎқ)
      var el=document.querySelector('.sb-sync-time');
      if(el){
        el.textContent='л°©кёҲ лҸҷкё°нҷ”лҗЁ вң“';
        setTimeout(function(){if(el)el.textContent='мӢӨмӢңк°„ лҸҷкё°нҷ” мӨ‘ рҹ”ҙ';},2000);
      }
    });
    _reloadTimer=null;
  }, 500);
}

// save() н•  л•Ң лӮҙ ліҖкІҪ ID кё°лЎқ (Realtime мӨ‘ліө л°©м§Җ)
function markMyChange(data){
  if(!data)return;
  var rows=Array.isArray(data)?data:[data];
  rows.forEach(function(r){if(r&&r.id)_myChanges.add(r.id);});
  // 5мҙҲ нӣ„ мһҗлҸҷ мӮӯм ң
  setTimeout(function(){
    rows.forEach(function(r){if(r&&r.id)_myChanges.delete(r.id);});
  },5000);
}

function rowToPt(r){return{id:r.id,chartNumber:r.chart_number||'',name:r.name||'',gender:r.gender||'лӮЁ',phone:r.phone||'',visitType:r.visit_type||'',referralPath:r.referral_path||'',treatmentArea:Array.isArray(r.treatment_area)?r.treatment_area:(typeof r.treatment_area==='string'?JSON.parse(r.treatment_area||'[]'):[]),memo:r.memo||'',createdAt:r.created_at||''};}
function ledRowToSB(r,date){return{id:r.id,date:date,chart_number:r.chartNumber||'',patient_name:r.patientName||'',cash_amount:+r.cashAmount||0,transfer_amount:+r.transferAmount||0,card_amount:+r.cardAmount||0,vendor:r.vendor||'',note:r.note||'',note_date:r.noteDate||'',note_days:r.noteDays||0,category:r.category||'',appointment_date:r.appointmentDate||'',appointment_time:r.appointmentTime||'',guidance_type:r.guidanceType||'',memo:r.memo||'',no_show:!!r.noShow,prescription:r.prescription||'',prescription_date:r.prescriptionDate||'',prescription_days:r.prescriptionDays||0};}
function sbToLedRow(r){return{id:r.id,chartNumber:r.chart_number||'',patientName:r.patient_name||'',cashAmount:r.cash_amount||0,transferAmount:r.transfer_amount||0,cardAmount:r.card_amount||0,vendor:r.vendor||'',note:r.note||'',noteDate:r.note_date||'',noteDays:r.note_days||0,category:r.category||'',appointmentDate:r.appointment_date||'',appointmentTime:r.appointment_time||'',guidanceType:r.guidance_type||'',memo:r.memo||'',noShow:r.no_show||false,prescription:r.prescription||'',prescriptionDate:r.prescription_date||'',prescriptionDays:r.prescription_days||0};}
function hcToSB(h){return{id:h.id,date:h.date,patient_id:h.patientId||'',chart_number:h.chartNumber||'',patient_name:h.patientName||'',phone:h.phone||'',visit_type:h.visitType||'',status:h.status||'pending',memo:h.memo||'',call_time:h.callTime||'',appt_done:!!h.apptDone};}
function sbToHc(r){return{id:r.id,date:r.date,patientId:r.patient_id||'',chartNumber:r.chart_number||'',patientName:r.patient_name||'',phone:r.phone||'',visitType:r.visit_type||'',status:r.status||'pending',memo:r.memo||'',callTime:r.call_time||'',apptDone:r.appt_done||false,createdAt:r.created_at||''};}
function inpToSB(date,roomId,bedIdx,b){return{id:b.id,date,room_id:roomId,bed_number:b.bed,name:b.name||'',meal_morning:b.meals?.morning||false,meal_lunch:b.meals?.lunch||false,meal_dinner:b.meals?.dinner||false,herbal_morning:b.herbal?.morning||'',herbal_lunch:b.herbal?.lunch||'',herbal_dinner:b.herbal?.dinner||''};}

// в”Җв”Җ Supabase м—җм„ң м „мІҙ лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// м „мІҙ patients нҺҳмқҙм§Җл„Өмқҙм…ҳ лЎңл“ң (1000лӘ… мҙҲкіј лҢҖмқ‘)
async function loadAllPatients(){
  const PAGE=1000;
  let all=[];
  let from=0;
  while(true){
    const{data,error}=await _sb.from('patients').select('*').range(from,from+PAGE-1);
    if(error){console.error('patients лЎңл“ң мҳӨлҘҳ:',error);break;}
    if(!data||data.length===0) break;
    all=all.concat(data);
    if(data.length<PAGE) break; // л§Ҳм§Җл§ү нҺҳмқҙм§Җ
    from+=PAGE;
  }
  return all;
}

// м „мІҙ ledger_rows нҺҳмқҙм§Җл„Өмқҙм…ҳ лЎңл“ң (н•ңлҸ„ м—ҶмқҢ)
async function loadAllLedgerRows(){
  const PAGE=1000;
  let all=[];
  let from=0;
  while(true){
    const{data,error}=await _sb.from('ledger_rows')
      .select('*')
      .order('date',{ascending:false})
      .range(from,from+PAGE-1);
    if(error){console.error('ledger нҺҳмқҙм§Җ лЎңл“ң мҳӨлҘҳ:',error);break;}
    if(!data||data.length===0) break;
    all=all.concat(data);
    console.log('ledger лЎңл“ң мӨ‘...', all.length+'н–ү');
    if(data.length<PAGE) break;
    from+=PAGE;
  }
  console.log('ledger м „мІҙ лЎңл“ң мҷ„лЈҢ:', all.length+'н–ү');
  return{data:all,error:null};
}

async function sbLoadAll(){
  if(!_sb)return false;
  showLoading(true);
  try{
    // patientsлҠ” лі„лҸ„ нҺҳмқҙм§Җл„Өмқҙм…ҳмңјлЎң м „мІҙ лЎңл“ң
    const [ptsAll, others] = await Promise.all([
      loadAllPatients(),
      Promise.allSettled([
        loadAllLedgerRows(),
        _sb.from('employees').select('name').order('id',{ascending:true}),
        _sb.from('schedule').select('*'),
        _sb.from('message_logs').select('*').order('created_at',{ascending:false}).limit(200),
        _sb.from('inpatients').select('*'),
        _sb.from('happycalls').select('*'),
      ]).then(results=>results.map(r=>r.status==='fulfilled'?r.value:{data:null,error:r.reason}))
    ]);
    const [ldg,emp,sch,msgs,inp,hc] = others;
    if(ptsAll&&ptsAll.length>0){
      S.patients=ptsAll.map(rowToPt);
      console.log('нҷҳмһҗ лЎңл“ң мҷ„лЈҢ:', S.patients.length+'лӘ…');
    }
    if(!ldg.error&&ldg.data){
      S.ledger={};
      ldg.data.forEach(r=>{if(!S.ledger[r.date])S.ledger[r.date]=[];S.ledger[r.date].push(sbToLedRow(r));});
      const apptRows=ldg.data.filter(r=>r.appointment_date);
      console.log('рҹ“… мқјкі„н‘ң лЎңл“ң:', ldg.data.length+'н–ү, мҳҲм•ҪлҚ°мқҙн„°:', apptRows.length+'кұҙ');
      // мҳӨлһҳлҗң н–ү мӨ‘ лҜёлһҳ мҳҲм•ҪлӮ м§ң мһҲлҠ” н–ү м¶”к°Җ лЎңл“ң
      const today=new Date().toISOString().slice(0,10);
      const{data:futureAppts}=await _sb.from('ledger_rows')
        .select('*')
        .gte('appointment_date', today)
        .not('appointment_date','is',null);
      if(futureAppts&&futureAppts.length>0){
        futureAppts.forEach(r=>{
          if(!S.ledger[r.date])S.ledger[r.date]=[];
          // мӨ‘ліө м ңкұ°
          if(!S.ledger[r.date].find(x=>x.id===r.id))
            S.ledger[r.date].push(sbToLedRow(r));
        });
        console.log('рҹ“… лҜёлһҳ мҳҲм•Ҫ м¶”к°Җ лЎңл“ң:', futureAppts.length+'кұҙ');
      }
    }
    if(!emp.error&&emp.data) S.employees=emp.data.map(r=>r.name);
    if(!sch.error&&sch.data){
      S.schedule={};
      sch.data.forEach(r=>{if(!S.schedule[r.date])S.schedule[r.date]={};S.schedule[r.date][r.employee_name]=r.shift;});
    }
    if(!msgs.error&&msgs.data){
      S.messageLogs=msgs.data.map(r=>({id:r.id,createdAt:r.created_at_kr||'',patientName:r.patient_name||'',to:r.to_number||'',type:r.type||'',status:r.status||'',text:r.text||''}));
    }
    if(!inp.error&&inp.data){
      S.inpatients={};
      inp.data.forEach(r=>{
        if(!S.inpatients[r.date])S.inpatients[r.date]={};
        if(!S.inpatients[r.date][r.room_id])S.inpatients[r.date][r.room_id]=[];
        const bi=r.bed_number-1;
        S.inpatients[r.date][r.room_id][bi]={id:r.id,bed:r.bed_number,name:r.name||'',meals:{morning:r.meal_morning||false,lunch:r.meal_lunch||false,dinner:r.meal_dinner||false},herbal:{morning:r.herbal_morning||'',lunch:r.herbal_lunch||'',dinner:r.herbal_dinner||''}};
      });
    }
    if(!hc.error&&hc.data){
      S.happycalls={};
      hc.data.forEach(r=>{if(!S.happycalls[r.date])S.happycalls[r.date]=[];S.happycalls[r.date].push(sbToHc(r));});
    }
    // wardBeds, wardHistoryлҠ” Supabase н…Ңмқҙлё” м—ҶмңјлҜҖлЎң localStorageм—җм„ң ліҙмҷ„
    try{
      const wbStr=localStorage.getItem('doridori_wardBeds');
      const whStr=localStorage.getItem('doridori_wardHistory');
      if(wbStr) S.wardBeds=JSON.parse(wbStr);
      if(whStr){ const wh=JSON.parse(whStr); S.wardHistory=Array.isArray(wh)?wh:[]; }
    }catch(e){}

    showLoading(false);
    return true;
  }catch(e){
    console.error('Supabase лЎңл“ң мҳӨлҘҳ:',e);
    showLoading(false);
    return false;
  }
}

// в”Җв”Җ Supabase м ҖмһҘ н•ЁмҲҳл“Ө в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function sbSave(key){
  if(!_sb)return;
  _isSaving=true; // Realtime м°ЁлӢЁ мӢңмһ‘
  try{
    if(key==='patients'){
      if(!S.patients.length){_isSaving=false;return;}
      const rows=S.patients.map(ptToRow);
      const BATCH=200; // 200лӘ…м”©
      const PARALLEL=5; // 5к°ң лҸҷмӢң
      const batches=[];
      for(let i=0;i<rows.length;i+=BATCH) batches.push(rows.slice(i,i+BATCH));
      for(let i=0;i<batches.length;i+=PARALLEL){
        const group=batches.slice(i,i+PARALLEL);
        await Promise.all(group.map(async(batch,gi)=>{
          for(let retry=0;retry<4;retry++){
            try{
              const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id',ignoreDuplicates:false});
              if(!error) return;
              if(error.code==='23505'||error.message?.includes('duplicate')) return; // мӨ‘ліө л¬ҙмӢң
              console.warn('л°°м№ҳ'+(i+gi)+' мһ¬мӢңлҸ„'+(retry+1),error.message);
              await new Promise(r=>setTimeout(r,300*(retry+1)));
            }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
          }
        }));
        if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,100));
      }
    }
    else if(key==='ledger'||key.startsWith('ledger:')){
      const targetDate=key.startsWith('ledger:')?key.slice(7):null;
      const rows=[];
      Object.entries(S.ledger).forEach(([date,rs])=>{
        if(targetDate&&date!==targetDate)return;
        rs.forEach(r=>rows.push(ledRowToSB(r,date)));
      });
      if(!rows.length){console.log('ledger: м ҖмһҘн•  н–ү м—ҶмқҢ');return;}
      console.log('ledger м ҖмһҘ мӢңмһ‘:', rows.length+'н–ү'+(targetDate?' ('+targetDate+')':''));
      const BATCH=100;
      for(let i=0;i<rows.length;i+=BATCH){
        const batch=rows.slice(i,i+BATCH);
        let ok=false;
        for(let retry=0;retry<3;retry++){
          const{error}=await _sb.from('ledger_rows').upsert(batch,{onConflict:'id'});
          if(!error){ok=true;break;}
          console.warn('ledger мһ¬мӢңлҸ„'+(retry+1)+' мҳӨлҘҳ:', error.code, error.message);
          await new Promise(r=>setTimeout(r,500*(retry+1)));
        }
        if(ok) console.log('ledger м ҖмһҘ мҷ„лЈҢ:', batch.length+'н–ү');
        else console.error('ledger м ҖмһҘ мөңмў… мӢӨнҢЁ:', batch.length+'н–ү');
      }
    }
    else if(key==='employees'){
      if(!S.employees.length)return;
      const{error}=await _sb.from('employees').upsert(S.employees.map(n=>({name:n})),{onConflict:'name',ignoreDuplicates:true});
      if(error)console.error('employees мҳӨлҘҳ:',error);
    }
    else if(key==='schedule'){
      const rows=[];
      Object.entries(S.schedule).forEach(([date,emps])=>
        Object.entries(emps).forEach(([emp,shift])=>{
          if(shift) rows.push({
            id: date+'_'+emp.replace(/[^a-zA-Z0-9к°Җ-нһЈ]/g,'_'),
            date,
            employee_name:emp,
            shift
          });
        })
      );
      if(!rows.length)return;
      // id кё°мӨҖ upsert (лҚ” м•Ҳм „)
      const{error}=await _sb.from('schedule').upsert(rows,{onConflict:'id'});
      if(error){
        console.error('schedule мҳӨлҘҳ:', JSON.stringify(error));
        // fallback: к°ңлі„ м ҖмһҘ
        for(const row of rows){
          const{error:e2}=await _sb.from('schedule').upsert([row],{onConflict:'id'});
          if(e2) console.warn('schedule к°ңлі„ м ҖмһҘ мӢӨнҢЁ:', row.id, JSON.stringify(e2));
        }
      }
    }
    else if(key==='messageLogs'){
      if(!S.messageLogs.length)return;
      const rows=S.messageLogs.map(l=>({id:l.id,created_at_kr:l.createdAt||'',patient_name:l.patientName||'',to_number:l.to||'',type:l.type||'',status:l.status||'',text:l.text||''}));
      const{error}=await _sb.from('message_logs').upsert(rows,{onConflict:'id'});
      if(error)console.error('messageLogs мҳӨлҘҳ:',error);
    }
    else if(key==='inpatients'){
      const rows=[];
      Object.entries(S.inpatients).forEach(([date,rooms])=>Object.entries(rooms).forEach(([roomId,beds])=>beds.forEach((b,bi)=>{if(b)rows.push(inpToSB(date,roomId,bi,b));})));
      if(!rows.length)return;
      const{error}=await _sb.from('inpatients').upsert(rows,{onConflict:'id'});
      if(error)console.error('inpatients мҳӨлҘҳ:',error);
    }
    else if(key==='happycalls'){
      const rows=[];
      Object.entries(S.happycalls||{}).forEach(([,hcs])=>hcs.forEach(h=>rows.push(hcToSB(h))));
      if(!rows.length)return;
      const{error}=await _sb.from('happycalls').upsert(rows,{onConflict:'id'});
      if(error)console.error('happycalls мҳӨлҘҳ:',error);
    }

  }catch(e){
    _isSaving=false; // мҳӨлҘҳ мӢңлҸ„ н”Ңлһҳк·ё н•ҙм ң
    console.error('sbSave мҳӨлҘҳ:',key,e);
    throw e;
  }finally{
    // м ҖмһҘ мҷ„лЈҢ нӣ„ 3мҙҲ л’Ө Realtime мһ¬к°ң (Supabase м „нҢҢ лҢҖкё°)
    setTimeout(function(){_isSaving=false;},3000);
  }
}

// Supabase м—җм„ң к°ңлі„ мӮӯм ң
async function sbDelete(table,id){
  if(!_sb)return;
  try{
    const{error}=await _sb.from(table).delete().eq('id',id);
    if(error)console.error('sbDelete мҳӨлҘҳ:',table,error);
  }catch(e){console.error('sbDelete мҳҲмҷё:',e);}
}

// м—°кІ° н…ҢмҠӨнҠё
async function testSupabaseConnection(){
  // DOMм—җм„ң м§Ғм ‘ мөңмӢ  к°’ мқҪм–ҙмҳӨкё° (oninputмқҙ м”№нҳ”мқ„ кІҪмҡ° лҢҖл№„)
  const urlEl=document.querySelector('input[placeholder*="supabase.co"]');
  const keyEl=document.querySelector('input[placeholder*="eyJhbGci"]');
  if(urlEl&&urlEl.value.trim()) S.supabaseUrl=urlEl.value.trim();
  if(keyEl&&keyEl.value.trim()) S.supabaseKey=keyEl.value.trim();

  if(!S.supabaseUrl||!S.supabaseKey){
    showToast('URLкіј KeyлҘј лЁјм Җ мһ…л Ҙн•ҙмЈјм„ёмҡ”','err');return;
  }
  if(!initSupabaseClient()){showToast('м—°кІ° мҙҲкё°нҷ” мӢӨнҢЁ - URL/KeyлҘј нҷ•мқён•ҙмЈјм„ёмҡ”','err');return;}
  showToast('м—°кІ° н…ҢмҠӨнҠё мӨ‘...');
  try{
    const{data,error}=await _sb.from('patients').select('id').limit(1);
    if(error){
      if(error.code==='42P01'){showToast('н…Ңмқҙлё”мқҙ м—ҶмҠөлӢҲлӢӨ. SQL мҠӨнӮӨл§ҲлҘј лЁјм Җ мӢӨн–үн•ҙмЈјм„ёмҡ”','err');}
      else{showToast('м—°кІ° мӢӨнҢЁ: '+error.message,'err');}
      S.sbConnected=false;
    }else{
      S.sbConnected=true;
      save('supabaseUrl');save('supabaseKey');
      showToast('вң… Supabase м—°кІ° м„ұкіө! лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...');
      await sbLoadAll();
      render();
    }
  }catch(e){
    showToast('м—°кІ° мҳӨлҘҳ: '+e.message,'err');
    S.sbConnected=false;
  }
  render();
}

// лЎңл”© мҳӨлІ„л Ҳмқҙ
function showLoading(show){
  // лЎңл”© мҳӨлІ„л Ҳмқҙ - мҳӨлҘҳнҷ”л©ҙ м ҲлҢҖ н‘ңмӢң м•Ҳ н•Ё
  try{
    let el=document.getElementById('loading-overlay');
    if(show){
      if(!el){
        el=document.createElement('div');
        el.id='loading-overlay';
        el.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.7);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;pointer-events:none';
        el.innerHTML='<div style="width:36px;height:36px;border:4px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:13px;color:#374151">лҚ°мқҙн„° лҸҷкё°нҷ” мӨ‘...</div>';
        if(!document.getElementById('spin-style')){const s=document.createElement('style');s.id='spin-style';s.textContent='@keyframes spin{to{transform:rotate(360deg)}}';document.head.appendChild(s);}
        document.body.appendChild(el);
      }
      // 5мҙҲ нӣ„ мһҗлҸҷ м ңкұ° (л¬ҙн•ң лЎңл”© л°©м§Җ)
      setTimeout(function(){showLoading(false);},5000);
    }else{
      if(el)el.remove();
    }
  }catch(e){console.warn('showLoading мҳӨлҘҳ(л¬ҙмӢң):',e);}
}

const SB_KEYS=['patients','ledger','employees','schedule','messageLogs','inpatients','happycalls'];

function save(key){
  // 1. localStorage (мҳӨн”„лқјмқё л°ұм—…)
  try{
    localStorage.setItem('doridori_'+key,JSON.stringify(S[key]));
    localStorage.setItem('doridori__lastSaved',new Date().toLocaleString('ko-KR'));
  }catch(e){ console.error('localStorage м ҖмһҘ мҳӨлҘҳ:',key,e); }

  // 2. Supabase мҡ°м„  м ҖмһҘ (м—°кІ°лҗң кІҪмҡ°)
  if(_sb && S.sbConnected && SB_KEYS.includes(key)){
    sbSave(key).then(()=>{
      const el=document.querySelector('.sb-sync-time');
      if(el) el.textContent='вң… м ҖмһҘлҗЁ';
    }).catch(e=>{
      console.error('Supabase м ҖмһҘ мҳӨлҘҳ:',key,e);
      // Supabase мӢӨнҢЁн•ҙлҸ„ localStorageм—җлҠ” м ҖмһҘлҗҗмңјлҜҖлЎң мЎ°мҡ©нһҲ
    });
  }
}

// Supabase м—°кІ° м—¬л¶Җм—җ л”°лқј лҚ°мқҙн„° лЎңл“ң мҡ°м„ мҲңмң„ кІ°м •
async function loadFromSupabaseOrLocal(){
  if(_sb && S.sbConnected){
    // Supabaseм—җм„ң лЎңл“ң (мөңмӢ  лҚ°мқҙн„°)
    const loaded = await sbLoadAll();

window.updLedgerAC=function(d, rowId, val){
  // 1. мғҒнғң м ҖмһҘ
  const rows=getLedger(d);
  const row=rows.find(r=>r.id===rowId);
  if(!row)return;
  row.chartNumber=val;

  // 2. м •нҷ•нһҲ мқјм№ҳн•ҳлҠ” нҷҳмһҗк°Җ мһҲмңјл©ҙ мҰүмӢң мһҗлҸҷмһ…л Ҙ
  const exactPt=S.patients.find(p=>p.chartNumber===val.trim());
  if(exactPt){
    row.patientName=exactPt.name;
    if(!row.category&&exactPt.visitType) row.category=exactPt.visitType;
    saveLedger(d,rows);
    // DOM мҰүмӢң л°ҳмҳҒ
    const nameInp=document.querySelector(`input[data-row-id="${rowId}"][data-field="patientName"]`);
    if(nameInp){nameInp.value=exactPt.name;nameInp.style.background='#f0fdf4';}
    const catSel=document.querySelector(`select[data-row-id="${rowId}"][data-field="category"]`);
    if(catSel&&!catSel.value&&exactPt.visitType) catSel.value=exactPt.visitType;
    // л“ңлЎӯлӢӨмҡҙ лӢ«кё°
    const acEl=document.getElementById('ac_'+rowId);
    if(acEl){acEl.innerHTML='';acEl.style.display='none';}
    return;
  }
  saveLedger(d,rows);

  // 3. л¶Җл¶„ мқјм№ҳ вҶ’ л“ңлЎӯлӢӨмҡҙ н‘ңмӢң
  const acEl=document.getElementById('ac_'+rowId);
  if(!acEl)return;
  if(!val||val.length<1){acEl.innerHTML='';acEl.style.display='none';return;}
  const results=searchPt(val);
  if(!results.length){acEl.innerHTML='';acEl.style.display='none';return;}
  acEl.style.display='block';
  acEl.innerHTML=results.map(p=>{
    const chart=p.chartNumber.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const name=p.name.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const phone=(p.phone||'').replace(/'/g,"\'");
    const vtype=(p.visitType||'').replace(/'/g,"\'");
    return`<div class="ac-item" onmousedown="acPickLedger('${d}','${rowId}','${chart}','${name}','${phone}','${vtype}')">
      <div style="font-weight:500">${p.name} <span style="color:#9ca3af;font-size:11px;font-family:monospace">${p.chartNumber}</span></div>
      <div class="ac-sub">${p.phone||'лІҲнҳём—ҶмқҢ'} В· <span style="color:#2563eb">${p.visitType||''}</span></div>
    </div>`;
  }).join('');
};

function getWeekRanges(ym){
  var parts=ym.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1]);
  var daysInMonth=new Date(y,m,0).getDate();
  var weeks=[
    {label:'1мЈј',start:ym+'-01',end:ym+'-07'},
    {label:'2мЈј',start:ym+'-08',end:ym+'-14'},
    {label:'3мЈј',start:ym+'-15',end:ym+'-21'},
    {label:'4мЈј',start:ym+'-22',end:ym+'-28'},
  ];
  if(daysInMonth>28) weeks.push({label:'5мЈј',start:ym+'-29',end:ym+'-'+String(daysInMonth).padStart(2,'0')});
  return weeks;
}
function getWeekData(wk){
  var all=[];
  Object.entries(S.happycalls||{}).forEach(function(e){
    var k=e[0],v=e[1];
    if(k>=wk.start&&k<=wk.end) all=all.concat(v);
  });
  return all;
}

window.saveQuickAppts=async function(){
  if(!S.quickAppts||!S.quickAppts.length) return;
  const today=todayStr();
  const valid=S.quickAppts.filter(r=>r.patientName||r.chartNumber);
  if(!valid.length){showToast('мһ…л Ҙлҗң мҳҲм•Ҫмқҙ м—ҶмҠөлӢҲлӢӨ','err');return;}

  // мҳҲм•ҪлӮ м§ңлі„лЎң к·ёлЈ№н•‘ вҶ’ н•ҙлӢ№ лӮ м§ң мқјкі„н‘ңм—җ к°Ғк°Ғ м ҖмһҘ
  const byDate={};
  valid.forEach(r=>{
    const targetDate=r.appointmentDate||today;
    if(!byDate[targetDate]) byDate[targetDate]=[];
    byDate[targetDate].push(r);
  });

  const savedRows=[];
  Object.entries(byDate).forEach(([targetDate,rows])=>{
    const existing=getLedger(targetDate);
    const newRows=rows.map(r=>({
      ...newLedgerRow(),
      id:uid(),
      chartNumber:r.chartNumber||'',
      patientName:r.patientName||'',
      appointmentTime:r.appointmentTime||'',
      appointmentDate:targetDate,
      guidanceType:r.guidanceType||'',
      category:r.category||'мһ¬м§„',
      memo:r.memo||''
    }));
    saveLedger(targetDate, [...existing, ...newRows]);
    savedRows.push(...newRows);
  });

  // м ҖмһҘ мҷ„лЈҢ нӣ„ кё°лЎқмңјлЎң лӮЁкё°кё° (savedAt м¶”к°Җ)
  if(!S.quickApptsHistory) S.quickApptsHistory=[];
  savedRows.forEach(r=>{
    S.quickApptsHistory.unshift({
      ...r,
      savedAt:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
    });
  });
  // мөңк·ј 20кұҙл§Ң мң м§Җ
  if(S.quickApptsHistory.length>20) S.quickApptsHistory=S.quickApptsHistory.slice(0,20);

  S.quickAppts=[];
  const dates=[...new Set(savedRows.map(r=>r.appointmentDate))].join(', ');
  showToast('вң… '+savedRows.length+'кұҙ м ҖмһҘ мҷ„лЈҢ! вҶ’ '+dates+' мқјкі„н‘ң');
  render();
};

    });

function updateBed(date,roomId,bedIdx,field,val){
  const ip=getInpatients(date);
  if(field==='name') ip[roomId][bedIdx].name=val;
  else if(field.startsWith('meal_')){
    const mealKey=field.replace('meal_','');
    ip[roomId][bedIdx].meals[mealKey]=val;
  } else if(field.startsWith('herb_')){
    const herbKey=field.replace('herb_','');
    ip[roomId][bedIdx].herbal[herbKey]=val;
  }
  saveInpatients(date);
}

// в”Җв”Җ м—‘м…Җ iOS нҳёнҷҳ лӢӨмҡҙлЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function xlsxDownload(wb,filename){
  try{
    // iOS SafariлҠ” XLSX.writeFile м•ҲлҗЁ вҶ’ Blob URL л°©мӢқ мӮ¬мҡ©
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
  }catch(e){
    // мөңнӣ„ fallback
    try{XLSX.writeFile(wb,filename);}catch(e2){showToast('лӢӨмҡҙлЎңл“ң мӢӨнҢЁ: '+e2.message,'err');}
  }
}

function renderDashboard(){
  const td=S.ledgerDate;
  const realToday=todayStr(); // мӢӨм ң мҳӨлҠҳ лӮ м§ң (н•ӯмғҒ)
  const thisMonth=td.slice(0,7); // м„ нғқн•ң лӮ м§ң кё°мӨҖ мӣ”
  const realThisMonth=realToday.slice(0,7); // мӢӨм ң мқҙлІҲлӢ¬
  const rows=getLedger(td);
  const allPt=S.patients;
  // мҳӨлҠҳ мҳҲм•Ҫ = мӢӨм ң мҳӨлҠҳ кё°мӨҖ (tdк°Җ м•„лӢҢ realToday)
  // мҳӨлҠҳ мҳҲм•Ҫ = ліҙкі м„ң м„ нғқ лӮ м§ң(td) кё°мӨҖмңјлЎң м „мІҙ мқјкі„н‘ң кІҖмғү
  const todayAppts=(()=>{
    const all=[];
    Object.entries(S.ledger).forEach(([ledgerDate,dayRows])=>{
      (dayRows||[]).forEach(r=>{
        if(r.appointmentDate===td) all.push({...r, ledgerDate});
      });
    });
    return all.sort((a,b)=>(a.appointmentTime||'').localeCompare(b.appointmentTime||''));
  })();
  // лӮҙмқј мҳҲм•Ҫ = н•ӯмғҒ мӢӨм ң мҳӨлҠҳ+1 (ліҙкі м„ң лӮ м§ң л¬ҙкҙҖ)
  const tmrDate=addDays(td,1); // ліҙкі м„ң лӮ м§ң кё°мӨҖ лӢӨмқҢлӮ 
  const tmrAppts=(()=>{
    const all=[];
    Object.entries(S.ledger).forEach(([ledgerDate,dayRows])=>{
      (dayRows||[]).forEach(r=>{
        if(r.appointmentDate===tmrDate) all.push({...r, ledgerDate});
      });
    });
    return all.sort((a,b)=>(a.appointmentTime||'').localeCompare(b.appointmentTime||''));
  })();
  // мҳӨлҠҳ лӮ м§ң кё°мӨҖ м „мІҙ мқјкі„н‘ңм—җм„ң мӢ нҷҳ/TA м§‘кі„
  const allTodayRows=(()=>{
    const all=[];
    Object.values(S.ledger).forEach(dayRows=>{
      (dayRows||[]).forEach(r=>{
        if(r.appointmentDate===td || (!r.appointmentDate && Object.keys(S.ledger).find(k=>S.ledger[k]===dayRows)===td))
          all.push(r);
      });
    });
    return all;
  })();
  // мӢ нҷҳ: мқјкі„н‘ң кө¬л¶„мқҙ 'мӢ нҷҳ'мқё кІғ
  const newPts=rows.filter(r=>r.category==='мӢ нҷҳ');
  // TA: мқјкі„н‘ңм—җм„ңл§Ң м§‘кі„ (мҳӨлҠҳ лӮ м§ң мқјкі„н‘ң кө¬л¶„ кё°мӨҖ)
  const taCats=['ta','taмҙҲм§„','taмқјл°ҳ','taм¶”лӮҳ'];
  const taFromLedger=rows.filter(r=>taCats.includes(r.category));
  // мқјкі„н‘ң кё°мӨҖмңјлЎңл§Ң (нҷҳмһҗлӘ©лЎқ visitType м ңмҷё)
  const taPatients=taFromLedger;
  // мҳӨлҠҳ лӮ м§ң мқјкі„н‘ң мӨ‘ мҳҲм•ҪлӮ м§ң м—ҶлҠ” кұҙ (мҳӨлҠҳ м§„лЈҢ лӢ№мқј мӣҢнҒ¬мқё)
  // м„ нғқ лӮ м§ң(td) кё°мӨҖ мқјкі„н‘ң (ліҙкі м„ң лӮ м§ңмҷҖ лҸҷкё°нҷ”)
  const todayRows=getLedger(td);
  const todayPtRows=todayRows.filter(r=>r.chartNumber||r.patientName);
  const todayPtCount=todayPtRows.length;
  const todayBigubyeoRows=todayPtRows.filter(r=>r.note&&r.note.trim());
  // лҜёмҳҲм•Ҫ = мҳҲм•ҪлӮ м§ң м—Ҷкұ°лӮҳ лӢ№мқј мҳҲм•Ҫ(м„ нғқлӮ м§ңмҷҖ лҸҷмқј)
  const noApptList=todayPtRows.filter(r=>!r.appointmentDate||(r.appointmentDate===td));
  const noApptCount=noApptList.length;
  const totalRev=todayRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);

  // л№„кёүм—¬: мқҙлІҲлӢ¬ м „мІҙ мқјкі„н‘ңм—җм„ң category==='л№„кёүм—¬'
  const thisMonthLedger=Object.entries(S.ledger).filter(([k])=>k.startsWith(realThisMonth)).flatMap(([,v])=>v);
  const bigubyeoRows=thisMonthLedger.filter(r=>r.note&&r.note.trim());
  const bigubyeoToday=rows.filter(r=>r.note&&r.note.trim());
  const monthlyAppts=Object.entries(S.ledger).filter(([d])=>d.startsWith(realThisMonth)).flatMap(([,rs])=>rs.filter(r=>r.appointmentDate&&r.appointmentDate.startsWith(realThisMonth)));
  const ystDate=addDays(realToday,-1);
  const ystNoShows=getLedger(ystDate).filter(r=>r.noShow);
  // мқјмқј мҳҲм•ҪмңЁ: мҳӨлҠҳ мӢӨм ң лӮҙмӣҗ / мҳӨлҠҳ мҳҲм•Ҫмһҗ
  const todayLedgerCount=todayRows.filter(r=>r.chartNumber||r.patientName).length;
  const rate=todayAppts.length>0
    ?Math.min(100,Math.round(todayLedgerCount/todayAppts.length*100))
    :(todayLedgerCount>0?100:0);
  const mRate=allPt.length>0?Math.round(monthlyAppts.length/allPt.length*100):0;
  const monthNoShow=Object.entries(S.ledger).filter(([d])=>d.startsWith(realThisMonth)).flatMap(([lDate,rs])=>rs.filter(r=>r.noShow).map(r=>({...r,ledgerDate:lDate})));

  // лӘЁлӢ¬ HTML

window.setBigubyeoNote=function(d,id,val){
  // val = "label|days" or ""
  const parts=(val||'').split('|');
  const label=parts[0]||'';
  const days=parseInt(parts[1])||0;
  const rows=getLedger(d).map(r=>r.id===id?{...r,note:label,noteDays:days,noteDate:r.noteDate||d}:r);
  saveLedger(d,rows);
  if(_sb&&S.sbConnected) sbSave('ledger');
  render();
};
window.setBigubyeo=function(d,id,val){
  if(!val)return;
  const parts=val.split('|');
  const label=parts[0];
  const days=parseInt(parts[1])||0;
  const rows=getLedger(d).map(r=>r.id===id?{...r,prescription:label,prescriptionDays:days,prescriptionDate:r.prescriptionDate||d}:r);
  saveLedger(d,rows);
  if(_sb&&S.sbConnected) sbSave('ledger');
  render();
};
window.updLR=(d,id,field,val)=>{
  saveLedger(d,getLedger(d).map(r=>r.id===id?{...r,[field]:val}:r));
  // мӨ‘мҡ” н•„л“ң ліҖкІҪ мӢң Supabase мҰүмӢң м ҖмһҘ
  const importantFields=['category','appointmentDate','appointmentTime',
    'cashAmount','transferAmount','cardAmount','prescriptionDate','noteDate','patientName','chartNumber'];
  if(importantFields.includes(field)){
    if(_sb&&S.sbConnected){
      sbSave('ledger').catch(e=>console.error('ledger м ҖмһҘмҳӨлҘҳ:',e));
    }
  }
};
window.addLR=(d)=>{const rows=getLedger(d);rows.push(newLedgerRow());saveLedger(d,rows);render()};

window.acPickLedger=(d,id,chart,name,phone,visitType)=>{

function renderCalendar(){
  const m=S.calMonth;const[y,mo]=m.split('-').map(Number);
  const firstDay=new Date(y,mo-1,1).getDay();
  const daysInMonth=new Date(y,mo,0).getDate();
  const prevDays=new Date(y,mo-1,0).getDate();
  // лӘЁл“  мқјкі„н‘ңм—җм„ң appointmentDate кё°мӨҖмңјлЎң лӢ¬л Ҙм—җ н‘ңмӢң
  const allAppts={};
  Object.entries(S.ledger).forEach(([ledgerDate,rs])=>{
    (rs||[]).filter(r=>r.appointmentDate&&!r.noShow).forEach(r=>{
      const d=r.appointmentDate;
      if(!allAppts[d])allAppts[d]=[];
      // мӨ‘ліө л°©м§Җ + ledgerDate(мӣҗліё мқјкі„н‘ң лӮ м§ң) нҸ¬н•Ё
      if(!allAppts[d].some(x=>x.chartNumber===r.chartNumber&&x.appointmentTime===r.appointmentTime))
        allAppts[d].push({...r, ledgerDate});
    });
  });
  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({day:prevDays-i,cur:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1+1,cur:false});
  const selDate=S.calSelectedDate;
  const selAppts=selDate?allAppts[selDate]||[]:[];

  return`<div class="content">
    <div class="page-title">рҹ“… лӢ¬л Ҙ мҳҲм•Ҫл·°</div>
    <div class="action-bar">
      <div class="date-nav-wrap">
        <button class="date-nav-btn" onclick="btnCalPrev()">&#8249;</button>
        <div class="date-nav-center" style="min-width:90px;cursor:default"><span id="disp-cal-month">${m.replace('-','л…„ ')}мӣ”</span></div>
        <button class="date-nav-btn" onclick="btnCalNext()">&#8250;</button>
      </div>
      <button class="btn" onclick="S.calMonth=todayStr().slice(0,7);render()">мҳӨлҠҳ</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr${selDate?' 320px':''};gap:16px">
      <div>
        <div class="cal-grid">
          ${['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '].map(d=>`<div class="cal-hdr-cell">${d}</div>`).join('')}
          ${cells.map(c=>{
            const dateStr=c.cur?`${y}-${p2(mo)}-${p2(c.day)}`:null;
            const apts=dateStr&&allAppts[dateStr]?allAppts[dateStr]:[];
            const isToday=dateStr===todayStr();
            const isSel=dateStr===selDate;
            return`<div class="cal-cell${!c.cur?' other-month':''}${isToday&&!isSel?' today':''}${isSel?' selected':''}" onclick="${c.cur?`S.calSelectedDate=S.calSelectedDate==='${dateStr}'?null:'${dateStr}';render()`:''}" >
              <div class="cal-date-num">${c.day}</div>
              ${apts.slice(0,3).map(a=>`<div class="cal-apt-pill" style="background:#dbeafe;color:#1e40af">${a.patientName||a.chartNumber||'-'} ${a.appointmentTime||''}</div>`).join('')}
              ${apts.length>3?`<div style="font-size:10px;color:#9ca3af">+${apts.length-3}лӘ…</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
      ${selDate?`<div class="section-card" style="height:fit-content">
        <div class="section-hdr"><div class="section-title">${fmtDot(selDate)}</div><span class="badge badge-blue">${selAppts.length}лӘ…</span></div>
        ${selAppts.length===0?'<div class="no-data">мҳҲм•Ҫ м—ҶмқҢ</div>':`<div style="overflow-y:auto;max-height:500px"><table style="font-size:13px;width:100%"><thead><tr><th>мқҙлҰ„</th><th>мӢңк°„</th><th>кө¬л¶„</th><th>мӣҗліё</th></tr></thead><tbody>
        ${selAppts.map(r=>`<tr>
          <td style="font-weight:600">${r.patientName||'-'}</td>
          <td style="font-size:12px">${r.appointmentTime||'-'}</td>
          <td>${r.category?`<span class="badge badge-gray">${r.category}</span>`:'-'}</td>
          <td><button class="btn btn-sm" style="font-size:11px;padding:2px 8px;white-space:nowrap" onclick="S.ledgerDate='${r.ledgerDate||selDate}';nav('ledger')" title="${r.ledgerDate||selDate} мқјкі„н‘ңлЎң мқҙлҸҷ">рҹ“Ӣ${r.ledgerDate?r.ledgerDate.slice(5).replace('-','/'):'лӢ№мқј'}</button></td>
        </tr>`).join('')}
        </tbody></table></div>`}
        <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="S.ledgerDate='${selDate}';nav('ledger')">${I.ledger} лӢ№мқј(${selDate.slice(5).replace('-','/')}) мқјкі„н‘ң</button>
        </div>
      </div>`:''}
    </div>
  </div>`;
}

window.handleXlsUpload=(input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      if(!window.XLSX){showToast('м—‘м…Җ лқјмқҙлёҢлҹ¬лҰ¬ лЎңл”© мӨ‘... мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”','err');loadXLSX(()=>showToast('мӨҖл№„лҗҗмҠөлӢҲлӢӨ. лӢӨмӢң м—…лЎңл“ңн•ҙмЈјм„ёмҡ”'));return;}
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){showToast('лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ (н—ӨлҚ” нҸ¬н•Ё 2н–ү мқҙмғҒ н•„мҡ”)','err');return;}
      const header=rows[0].map(h=>(h||'').toString().trim());
      // м»¬лҹј л§Өн•‘ (н—ӨлҚ”лӘ…мңјлЎң м°ҫкұ°лӮҳ мҲңм„ңлЎң fallback)
      function findCol(names){
        for(const n of names){const i=header.findIndex(h=>h.includes(n));if(i>=0)return i;}
        return -1;
      }
      const colChart=findCol(['м°ЁнҠёлІҲнҳё','м°ЁнҠё','chart'])>=0?findCol(['м°ЁнҠёлІҲнҳё','м°ЁнҠё','chart']):0;
      const colName=findCol(['мқҙлҰ„','м„ұлӘ…','name'])>=0?findCol(['мқҙлҰ„','м„ұлӘ…','name']):1;
      const colGender=findCol(['м„ұлі„','gender'])>=0?findCol(['м„ұлі„','gender']):2;
      const colPhone=findCol(['м „нҷ”','м—°лқҪмІҳ','phone','tel'])>=0?findCol(['м „нҷ”','м—°лқҪмІҳ','phone','tel']):3;
      const colVisit=findCol(['кө¬л¶„','visitType','л°©л¬ё','лӮҙмӣҗ'])>=0?findCol(['кө¬л¶„','visitType','л°©л¬ё','лӮҙмӣҗ']):4;
      const colRef=findCol(['лӮҙмӣҗкІҪлЎң','кІҪлЎң','referral'])>=0?findCol(['лӮҙмӣҗкІҪлЎң','кІҪлЎң','referral']):5;
      const colTreat=findCol(['м№ҳлЈҢ','м№ҳлЈҢл¶Җмң„','treat'])>=0?findCol(['м№ҳлЈҢ','м№ҳлЈҢл¶Җмң„','treat']):6;
      const colMemo=findCol(['л©”лӘЁ','memo','л№„кі ','note'])>=0?findCol(['л©”лӘЁ','memo','л№„кі ','note']):7;
      const parsed=rows.slice(1).filter(r=>r[colChart]||r[colName]).map(r=>{
        const chartNum=r[colChart]?r[colChart].toString().trim():'';
        const nm=r[colName]?r[colName].toString().trim():'';
        if(!chartNum&&!nm)return null;
        const treatRaw=r[colTreat]?r[colTreat].toString():'';
        const treatArr=treatRaw?treatRaw.split(/[,гҖҒ/]+/).map(t=>t.trim()).filter(Boolean):[];
        return{
          id:uid(),chartNumber:chartNum,name:nm,
          gender:r[colGender]?r[colGender].toString().trim():'лӮЁ',
          phone:r[colPhone]?r[colPhone].toString().trim():'',
          visitType:r[colVisit]?r[colVisit].toString().trim():'мӢ нҷҳ',
          referralPath:r[colRef]?r[colRef].toString().trim():'кё°нғҖ',
          treatmentArea:treatArr,
          memo:r[colMemo]?r[colMemo].toString().trim():'',
          createdAt:new Date().toISOString()
        };
      }).filter(Boolean);
      if(parsed.length===0){showToast('мң нҡЁн•ң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ','err');return;}
      S.xlsImportData=parsed;
      S.xlsImportMode='skip';
      render();
    }catch(err){
      showToast('нҢҢмқј мқҪкё° мҳӨлҘҳ: '+err.message,'err');
      console.error(err);
    }
    input.value='';
  };
  reader.onerror=()=>showToast('нҢҢмқјмқ„ мқҪмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ','err');
  reader.readAsArrayBuffer(file);
};

window.confirmImport=async()=>{
  const data=S.xlsImportData;if(!data)return;
  let added=0,skipped=0,overwritten=0;
  data.forEach(r=>{
    const idx=S.patients.findIndex(p=>p.chartNumber===r.chartNumber);
    if(idx>=0){
      if(S.xlsImportMode==='overwrite'){S.patients[idx]={...r,id:S.patients[idx].id};overwritten++;}
      else skipped++;
    } else {S.patients.push(r);added++;}
  });
  S.xlsImportData=null;
  render();
  // в‘  localStorage - мҡ©лҹү мҙҲкіј мӢң л¶„н•  м ҖмһҘ
  // patientsлҠ” localStorage м ҖмһҘ м•Ҳ н•Ё (5MB мҙҲкіј л°©м§Җ, Supabaseм—җл§Ң м ҖмһҘ)
  if(!_sb||!S.sbConnected){
    showToast(`вң… лЎңм»¬ м ҖмһҘ! мӢ к·ң ${added}лӘ… (Supabase лҜём—°кІ°)`);
    return;
  }
  // в‘Ў Supabase кі мҶҚ лі‘л ¬ л°°м№ҳ м ҖмһҘ (8000лӘ… лҢҖмқ‘)
  const total=S.patients.length;
  const BATCH=200, PARALLEL=5;
  const rows=S.patients.map(ptToRow);
  const batches=[];
  for(let i=0;i<rows.length;i+=BATCH) batches.push(rows.slice(i,i+BATCH));
  let savedCount=0, failCount=0;
  _isSaving=false;
  showToast(`м ҖмһҘ мӢңмһ‘ (${total}лӘ… / ${batches.length}л°°м№ҳ)`);
  for(let i=0;i<batches.length;i+=PARALLEL){
    const group=batches.slice(i,i+PARALLEL);
    await Promise.all(group.map(async(batch,gi)=>{
      for(let retry=0;retry<4;retry++){
        try{
          const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id'});
          if(!error){savedCount+=batch.length;return;}
          if(error.code==='23505'||error.message?.includes('duplicate')){savedCount+=batch.length;return;}
          console.warn('л°°м№ҳ'+(i+gi)+' мһ¬мӢңлҸ„'+(retry+1),error.message);
          await new Promise(r=>setTimeout(r,300*(retry+1)));
        }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
      }
      failCount+=batch.length;
    }));
    // м§„н–үлҘ  н‘ңмӢң (100л°°м№ҳл§ҲлӢӨ)
    if((i/PARALLEL)%4===0||i+PARALLEL>=batches.length){
      const pct=Math.round(Math.min(savedCount+failCount,total)/total*100);
      showToast(`м ҖмһҘ мӨ‘... ${savedCount}/${total}лӘ… (${pct}%)`);
    }
    if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,80));
  }
  if(failCount===0){

window.savePatientsToDB=async function(){
  if(!S.patients.length){showToast('м ҖмһҘн•  нҷҳмһҗк°Җ м—ҶмҠөлӢҲлӢӨ','err');return;}
  // patientsлҠ” localStorage м ҖмһҘ м•Ҳ н•Ё (Supabaseм—җл§Ң м ҖмһҘ)
  if(!_sb||!S.sbConnected){
    showToast('вң… лЎңм»¬м—җ м ҖмһҘлҗЁ (Supabase лҜём—°кІ°)');return;
  }
  const total=S.patients.length;
  const BATCH=200,PARALLEL=5;
  const btn=document.querySelector('[onclick="savePatientsToDB()"]');
  if(btn){btn.textContent='м ҖмһҘ мӨ‘...';btn.disabled=true;}
  const allRows=S.patients.map(ptToRow);
  const batches=[];
  for(let i=0;i<allRows.length;i+=BATCH) batches.push(allRows.slice(i,i+BATCH));
  let saved=0,failed=0;
  _isSaving=false;
  for(let i=0;i<batches.length;i+=PARALLEL){
    const group=batches.slice(i,i+PARALLEL);
    await Promise.all(group.map(async(batch)=>{
      for(let retry=0;retry<4;retry++){
        try{
          const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id'});
          if(!error){saved+=batch.length;return;}
          if(error.code==='23505'||error.message?.includes('duplicate')){saved+=batch.length;return;}
          await new Promise(r=>setTimeout(r,300*(retry+1)));
        }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
      }
      failed+=batch.length;
    }));
    const pct=Math.round(Math.min(saved+failed,total)/total*100);
    if(btn)btn.textContent=`${pct}% (${Math.min(saved+failed,total)}/${total})`;
    if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,80));
  }
  if(btn){btn.textContent='рҹ’ҫ м ҖмһҘн•ҳкё°';btn.disabled=false;}
  if(failed===0) showToast(`вң… ${total}лӘ… м „мІҙ м ҖмһҘ мҷ„лЈҢ!`);
  else showToast(`вҡ пёҸ ${saved}лӘ… м ҖмһҘ / ${failed}лӘ… мӢӨнҢЁ`,'err');
};

window.applyDupDelete=async function(){
  const nameMap={};
  S.patients.forEach(p=>{
    const nm=(p.name||'').trim();
    if(!nm) return;
    if(!nameMap[nm]) nameMap[nm]=[];
    nameMap[nm].push(p);
  });
  const dupNames=new Set(Object.entries(nameMap).filter(([,a])=>a.length>1).map(([n])=>n));
  const toDelete=S.patients.filter(p=>dupNames.has((p.name||'').trim())&&!window._dupKeepIds.has(p.id));
  if(!toDelete.length){showToast('мӮӯм ңн•  н•ӯлӘ© м—ҶмқҢ');document.getElementById('dup-overlay')?.remove();return;}
  const delIds=toDelete.map(p=>p.id);
  console.log('мӮӯм ң лҢҖмғҒ:', delIds.length+'лӘ…');
  document.getElementById('dup-overlay')?.remove();
  showToast('мӮӯм ң мӨ‘... ('+delIds.length+'лӘ…)');

  // 1. лЎңм»¬ лЁјм Җ м ңкұ° + localStorage мәҗмӢң мҷ„м „ мӮӯм ң
  S.patients=S.patients.filter(p=>!delIds.includes(p.id));
  try{localStorage.removeItem('doridori_patients');}catch(e){}
  render();

  // 2. Supabase мӮӯм ң
  if(_sb&&S.sbConnected){
    const BATCH=50;
    let failed=0;
    for(let i=0;i<delIds.length;i+=BATCH){
      const batch=delIds.slice(i,i+BATCH);
      let ok=false;
      for(let retry=0;retry<3;retry++){
        const{error}=await _sb.from('patients').delete().in('id',batch);
        if(!error){ok=true;console.log('Supabase мӮӯм ң OK:', batch.length+'лӘ…');break;}
        console.warn('мӮӯм ң мһ¬мӢңлҸ„'+(retry+1)+':', error.message);
        await new Promise(r=>setTimeout(r,500*(retry+1)));
      }
      if(!ok) failed+=batch.length;
    }
    // кІҖмҰқ: м•„м§Ғ лӮЁм•„мһҲмңјл©ҙ мһ¬мӮӯм ң
    const{data:check}=await _sb.from('patients').select('id').in('id',delIds);
    if(check&&check.length>0){
      console.warn('м•„м§Ғ лӮЁмқҖ лҚ°мқҙн„° к°•м ң мһ¬мӮӯм ң:', check.length+'лӘ…');
      await _sb.from('patients').delete().in('id',check.map(r=>r.id));
    }
    if(failed===0) showToast('вң… '+delIds.length+'лӘ… мҷ„м „ мӮӯм ң! (мғҲлЎңкі м№Ён•ҙлҸ„ мң м§Җ)');
    else showToast('вҡ пёҸ '+failed+'лӘ… мӮӯм ң мӢӨнҢЁ - лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”','err');
  } else {
    showToast('вң… лЎңм»¬ мӮӯм ңлҗЁ (Supabase лҜём—°кІ° - рҹ’ҫм ҖмһҘн•ҳкё° лҲҢлҹ¬мЈјм„ёмҡ”)','err');
  }
}

      .catch(e=>console.error('нҷҳмһҗмҲҳм • м ҖмһҘмҳҲмҷё:',e));
  }
  showToast('мҲҳм • мҷ„лЈҢ вң“');nav('patients');
};

window.hcUpd=(d,id,field,val)=>{
  const rows=getHappyCalls(d).map(h=>h.id===id?{...h,[field]:val}:h);
  S.happycalls[d]=rows;save('happycalls');
  // мғҒнғң/мҳҲм•Ҫмҷ„лЈҢ ліҖкІҪ мӢң н•ҙлӢ№ н–үл§Ң DOM м—…лҚ°мқҙнҠё (м „мІҙ re-render л°©м§Җ)
  if(field==='status'){
    const st=HC_STATUS.find(s=>s.id===val);
    // мғҒнғң лІ„нҠјл“Өл§Ң м—…лҚ°мқҙнҠё
    const row=document.getElementById('hcrow_'+id);
    if(row){
      const btns=row.querySelectorAll('[data-hc-status]');
      btns.forEach(btn=>{
        const sid=btn.getAttribute('data-hc-status');
        const s=HC_STATUS.find(x=>x.id===sid);
        if(!s)return;
        const active=sid===val;
        btn.style.border=`1px solid ${active?s.color:s.color+'44'}`;
        btn.style.background=active?s.bg:'#fff';
        btn.style.fontWeight=active?'600':'400';
      });
    }
  }
  if(field==='apptDone'){
    const row=document.getElementById('hcrow_'+id);
    if(row){
      const cb=row.querySelector('[data-hc-appt]');
      const lbl=row.querySelector('[data-hc-appt-lbl]');
      if(cb)cb.checked=val;
      if(lbl){lbl.textContent=val?'мҷ„лЈҢ':'лҜёмҷ„';lbl.style.color=val?'#2563eb':'#9ca3af';}
    }
  }
};

window.hcImportFromLedger=async(d)=>{
  // Supabase м—°кІ°лҗҗлҠ”лҚ° нҷҳмһҗ л№„м–ҙмһҲмңјл©ҙ лЁјм Җ лЎңл“ң
  if(_sb && S.sbConnected && S.patients.length===0){
    showToast('нҷҳмһҗ лҚ°мқҙн„° лЎңл“ң мӨ‘...');
    await sbLoadAll();
  }
  const ldg=getLedger(d)||[];
  if(!ldg.length){showToast('мқјкі„н‘ңм—җ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ','err');return;}
  if(!S.happycalls[d])S.happycalls[d]=[];
  let added=0;
  ldg.forEach(r=>{
    if(!(r.patientName||r.chartNumber))return;
    if(S.happycalls[d].some(h=>h.chartNumber===r.chartNumber&&h.patientName===r.patientName))return;
    // нҷҳмһҗ лӘ©лЎқм—җм„ң м •ліҙ л§Өм№ӯ (м „нҷ”лІҲнҳё м—°лҸҷ)
    const pt=S.patients.find(p=>p.chartNumber===r.chartNumber);
    S.happycalls[d].push({
      id:uid(),date:d,patientId:pt?pt.id:'',
      chartNumber:r.chartNumber||'',
      patientName:r.patientName||pt?.name||'',
      phone:pt?.phone||r.phone||'',
      visitType:r.category||pt?.visitType||'мһ¬м§„',
      status:'pending',memo:'',callTime:'',apptDone:false,
      createdAt:new Date().toISOString()
    });
    added++;
  });
  save('happycalls');
  if(_sb&&S.sbConnected) sbSave('happycalls');
  showToast(added>0?`${added}лӘ… л¶Ҳлҹ¬мҳӨкё° мҷ„лЈҢ вң“`:'мқҙлҜё лӘЁл‘җ м¶”к°Җлҗң нҷҳмһҗмһ…лӢҲлӢӨ');
  render();
};

function renderSchedule(){
  const m=S.scheduleMonth;const[y,mo]=m.split('-').map(Number);
  const days=new Date(y,mo,0).getDate();
  const emps=S.employees;
  function getShift(emp,d){return(S.schedule[`${m}-${p2(d)}`]||{})[emp]||''}
  function cycleShift(emp,d){
    const key=`${m}-${p2(d)}`;if(!S.schedule[key])S.schedule[key]={};
    const cur=S.schedule[key][emp]||'';const idx=SHIFTS.indexOf(cur);
    S.schedule[key][emp]=SHIFTS[(idx+1)%SHIFTS.length];save('schedule');if(_sb&&S.sbConnected)sbSave('schedule').catch(e=>console.error('schedule:',e));render();
  }
  window._cycleShift=cycleShift;
  return`<div class="content">

        <div class="date-nav-center" style="min-width:90px;cursor:default"><span id="disp-sched-month">${m.replace('-','л…„ ')}мӣ”</span></div>
        <button class="date-nav-btn" onclick="btnSchedNext()">&#8250;</button>

window.sendMsg=async()=>{
  const selPt=S.patients.find(p=>p.id===S.msgPatientId);
  if(!selPt||!selPt.phone)return showToast('нҷҳмһҗ л°Ҹ м „нҷ”лІҲнҳёлҘј нҷ•мқён•ҳм„ёмҡ”','err');
  const tmpl=MSG_TEMPLATES.find(t=>t.id===S.msgTemplate);
  let txt=S.msgText||tmpl?.text||'';
  txt=txt.replace('{name}',selPt.name);
  const logEntry={id:uid(),createdAt:new Date().toLocaleString('ko-KR'),patientName:selPt.name,to:selPt.phone,type:tmpl?.label||'м§Ғм ‘мһ…л Ҙ',text:txt,status:'pending'};
  if(S.solapiKey&&S.solapiSecret&&S.solapiSender){
    try{
      const HMAC=async(k,m)=>{const enc=new TextEncoder();const key=await crypto.subtle.importKey('raw',enc.encode(k),{name:'HMAC',hash:'SHA-256'},false,['sign']);const sig=await crypto.subtle.sign('HMAC',key,enc.encode(m));return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('')};
      const ts=Date.now().toString();const salt=Math.random().toString(36).slice(2);
      const sig=await HMAC(S.solapiSecret,ts+salt);
      const resp=await fetch('https://api.solapi.com/messages/v4/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`HMAC-SHA256 apiKey=${S.solapiKey}, date=${ts}, salt=${salt}, signature=${sig}`},body:JSON.stringify({message:{to:selPt.phone.replace(/-/g,''),from:S.solapiSender,text:txt}})});
      logEntry.status=resp.ok?'success':'error';
    }catch{logEntry.status='error';}
  } else {logEntry.status='success';}
  S.messageLogs.unshift(logEntry);save('messageLogs');showToast(logEntry.status==='success'?'м „мҶЎ мҷ„лЈҢ вң“':'м „мҶЎ мӢӨнҢЁ','err');render();
};

function renderStats(){
  const today=todayStr();
  const tab=S.statsTab||'daily';

  // в”Җв”Җ кіөнҶө мң нӢё в”Җв”Җ
  const fmtKrw2=n=>n>=10000?Math.round(n/10000)+'л§Ңмӣҗ':n.toLocaleString()+'мӣҗ';
  const CATS=CATEGORIES.filter(c=>c!=='л№„кёүм—¬');
  const catColor={'мһ¬м§„':'#94a3b8','мӢ нҷҳ':'#fbbf24','ta':'#22d3ee','taмҙҲм§„':'#22d3ee',
    'taмқјл°ҳ':'#22d3ee','taм¶”лӮҳ':'#22d3ee','6к°ңмӣ”мһ¬мҙҲм§„':'#fb923c','кұҙліҙм¶”лӮҳ':'#a78bfa',
    'л№„кёүм—¬':'#f472b6'};

  // в”Җв”Җ мқјлі„ нҶөкі„ (мөңк·ј 14мқј) в”Җв”Җ
  function getDailyStats(){
    const rows=[];
    for(let i=13;i>=0;i--){
      const d=addDays(today,-i);
      const dayRows=getLedger(d).filter(r=>r.chartNumber||r.patientName);
      const rev=dayRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
      const catCount={};
      dayRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      rows.push({date:d,count:dayRows.length,rev,catCount});
    }
    return rows;
  }

  // в”Җв”Җ мЈјлі„ нҶөкі„ (мөңк·ј 8мЈј) в”Җв”Җ
  function getWeeklyStats(){
    const rows=[];
    for(let w=7;w>=0;w--){
      const weekStart=addDays(today,-w*7-new Date().getDay());
      const weekEnd=addDays(weekStart,6);
      let count=0,rev=0;
      const catCount={};
      for(let i=0;i<=6;i++){
        const d=addDays(weekStart,i);
        const dayRows=getLedger(d).filter(r=>r.chartNumber||r.patientName);
        count+=dayRows.length;
        rev+=dayRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
        dayRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      }
      rows.push({date:weekStart+'~'+weekEnd.slice(5),count,rev,catCount});
    }
    return rows;
  }

  // в”Җв”Җ мӣ”лі„ нҶөкі„ (мөңк·ј 6к°ңмӣ”) в”Җв”Җ
  function getMonthlyStats(){
    const rows=[];
    for(let m=5;m>=0;m--){
      const d=new Date();
      d.setDate(1);
      d.setMonth(d.getMonth()-m);
      const month=d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'));
      const monthRows=Object.entries(S.ledger)
        .filter(([k])=>k.startsWith(month))
        .flatMap(([,rs])=>rs.filter(r=>r.chartNumber||r.patientName));
      const rev=monthRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
      const catCount={};
      monthRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      rows.push({date:month,count:monthRows.length,rev,catCount});
    }
    return rows;
  }

  const daily=getDailyStats();
  const weekly=getWeeklyStats();
  const monthly=getMonthlyStats();

  const data=tab==='daily'?daily:tab==='weekly'?weekly:monthly;
  const maxRev=Math.max(...data.map(d=>d.rev),1);
  const maxCount=Math.max(...data.map(d=>d.count),1);

  // мқҙлІҲлӢ¬ нҶөкі„
  const thisMonth=today.slice(0,7);
  const thisMonthRows=Object.entries(S.ledger)
    .filter(([k])=>k.startsWith(thisMonth))
    .flatMap(([,rs])=>rs.filter(r=>r.chartNumber||r.patientName));
  const thisMonthRev=thisMonthRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
  const goal=+S.goalRevenue||0;
  const goalPct=goal>0?Math.min(100,Math.round(thisMonthRev/goal*100)):0;

  // кө¬л¶„лі„ н•©кі„ (мқҙлІҲлӢ¬)
  const catSummary={};
  thisMonthRows.forEach(r=>{if(r.category)catSummary[r.category]=(catSummary[r.category]||0)+1;});

  return`<div class="content">
    <div class="page-title">рҹ“Ҡ нҶөкі„</div>

    <!-- лӘ©н‘ң л§Өм¶ң м№ҙл“ң -->

          <input type="number" class="form-inp" style="width:140px;font-size:13px"
            placeholder="лӘ©н‘ң кёҲм•Ў (мӣҗ)" value="${goal||''}"
            onchange="S.goalRevenue=+this.value;render()" min="0" step="100000">
        </div>
      </div>
      <div style="padding:0 4px 8px">
        ${goal>0?`
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span style="color:#374151">нҳ„мһ¬ <b>${fmtKrw(thisMonthRev)}</b></span>
          <span style="color:#6b7280">лӘ©н‘ң <b>${fmtKrw(goal)}</b></span>
          <span style="font-weight:700;color:${goalPct>=100?'#059669':goalPct>=70?'#2563eb':'#dc2626'}">${goalPct}%</span>
        </div>
        <div style="background:#e5e7eb;border-radius:99px;height:12px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:${goalPct>=100?'#059669':goalPct>=70?'#2563eb':'#3b82f6'};width:${goalPct}%;transition:width .5s"></div>
        </div>
        <div style="font-size:12px;color:#6b7280;margin-top:6px">
          ${goalPct>=100?'рҹҺү лӘ©н‘ң лӢ¬м„ұ!':fmtKrw(goal-thisMonthRev)+' лӮЁмқҢ'}
        </div>
        `:'<div style="font-size:13px;color:#9ca3af">лӘ©н‘ң кёҲм•Ўмқ„ мһ…л Ҙн•ҳл©ҙ м§„н–үлҘ мқҙ н‘ңмӢңлҗ©лӢҲлӢӨ</div>'}
      </div>
    </div>

    <!-- нғӯ м„ нғқ -->
    <div style="display:flex;gap:4px;margin-bottom:12px">
      ${['daily','weekly','monthly'].map((t,i)=>`
        <button class="btn${S.statsTab===t?' btn-primary':''}" style="font-size:13px"
          onclick="S.statsTab='${t}';render()">
          ${'мқјлі„(14мқј)/мЈјлі„(8мЈј)/мӣ”лі„(6к°ңмӣ”)'.split('/')[i]}
        </button>`).join('')}
    </div>

    <!-- л§Өм¶ң + нҷҳмһҗмҲҳ м°ЁнҠё -->
    <div class="section-card" style="margin-bottom:16px">
      <div class="section-hdr"><div class="section-title">рҹ’° л§Өм¶ң & нҷҳмһҗмҲҳ</div></div>
      <div style="overflow-x:auto;padding-bottom:8px">
        <div style="display:flex;align-items:flex-end;gap:6px;min-width:${data.length*60}px;height:180px;padding:0 8px">
          ${data.map((d,i)=>{
            const revH=Math.round((d.rev/maxRev)*140)||2;
            const cntH=Math.round((d.count/maxCount)*140)||2;
            const isToday=d.date===today||d.date.startsWith(today.slice(0,7));
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="font-size:10px;color:#6b7280;white-space:nowrap">${d.rev>0?fmtKrw2(d.rev):''}</div>
              <div style="display:flex;align-items:flex-end;gap:2px;height:140px">
                <div title="л§Өм¶ң ${fmtKrw(d.rev)}" style="width:14px;height:${revH}px;background:${isToday?'#2563eb':'#93c5fd'};border-radius:3px 3px 0 0;cursor:pointer"></div>
                <div title="нҷҳмһҗ ${d.count}лӘ…" style="width:14px;height:${cntH}px;background:${isToday?'#059669':'#6ee7b7'};border-radius:3px 3px 0 0;cursor:pointer"></div>
              </div>
              <div style="font-size:9px;color:#9ca3af;white-space:nowrap;transform:rotate(-35deg);transform-origin:top left;margin-top:4px;margin-left:4px">
                ${tab==='daily'?d.date.slice(5):tab==='weekly'?d.date.slice(5,10):d.date.slice(2)}

        </div>
        <div style="display:flex;gap:12px;padding:8px 8px 0;font-size:11px;color:#6b7280">
          <span><span style="display:inline-block;width:10px;height:10px;background:#93c5fd;border-radius:2px;margin-right:3px"></span>л§Өм¶ң</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#6ee7b7;border-radius:2px;margin-right:3px"></span>нҷҳмһҗмҲҳ</span>

    <!-- кө¬л¶„лі„ нҶөкі„ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="section-card">
        <div class="section-hdr"><div class="section-title">рҹ“Ӣ мқҙлІҲлӢ¬ кө¬л¶„лі„ нҳ„нҷ©</div></div>
        ${catEntries.length===0?'<div class="no-data">лҚ°мқҙн„° м—ҶмқҢ</div>':`
        <div style="padding:0 4px">
          ${catEntries.map(([cat,cnt])=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span style="font-size:12px;font-weight:600;min-width:70px">${cat}</span>
              <div style="flex:1;background:#f3f4f6;border-radius:99px;height:10px;overflow:hidden">

      <div class="section-card">
        <div class="section-hdr"><div class="section-title">рҹ“Ҳ кё°к°„ мҡ”м•Ҫ</div></div>
        <div style="padding:0 4px">
          ${[
            ['мҙқ нҷҳмһҗмҲҳ', data.reduce((s,d)=>s+d.count,0)+'лӘ…'],
            ['мҙқ л§Өм¶ң', fmtKrw(data.reduce((s,d)=>s+d.rev,0))],
            ['мқјнҸүк·  нҷҳмһҗ', Math.round(data.reduce((s,d)=>s+d.count,0)/data.length)+'лӘ…'],
            ['мқјнҸүк·  л§Өм¶ң', fmtKrw2(Math.round(data.reduce((s,d)=>s+d.rev,0)/data.filter(d=>d.rev>0).length||1))],

window.exportBackup=()=>{
  const data={
    _version:2, _exportedAt:new Date().toISOString(),
    patients:S.patients, ledger:S.ledger, employees:S.employees,
    schedule:S.schedule, messageLogs:S.messageLogs, inpatients:S.inpatients,
    happycalls:S.happycalls, user:S.user,
    solapiKey:S.solapiKey, solapiSecret:S.solapiSecret, solapiSender:S.solapiSender
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`clinic_backup_${todayStr()}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('л°ұм—… мҷ„лЈҢ вң“ (clinic_backup_'+todayStr()+'.json)');
};
window.importBackup=(input)=>{
  const file=input.files[0]; if(!file)return;
  if(!confirm('л°ұм—… нҢҢмқјмқ„ ліөмӣҗн•ҳл©ҙ нҳ„мһ¬ лҚ°мқҙн„°к°Җ лӘЁл‘җ көҗмІҙлҗ©лӢҲлӢӨ.\nкі„мҶҚн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data._version)throw new Error('мҳ¬л°”лҘё л°ұм—… нҢҢмқјмқҙ м•„лӢҷлӢҲлӢӨ');
      if(data.patients)S.patients=data.patients;
      if(data.ledger)S.ledger=data.ledger;
      if(data.employees)S.employees=data.employees;
      if(data.schedule)S.schedule=data.schedule;
      if(data.messageLogs)S.messageLogs=data.messageLogs;
      if(data.inpatients)S.inpatients=data.inpatients;
      if(data.happycalls)S.happycalls=data.happycalls;
      if(data.user)S.user=data.user;
      if(data.solapiKey)S.solapiKey=data.solapiKey;
      if(data.solapiSecret)S.solapiSecret=data.solapiSecret;
      if(data.solapiSender)S.solapiSender=data.solapiSender;
      // м „мІҙ м ҖмһҘ
      ['patients','ledger','employees','schedule','messageLogs','inpatients','happycalls','user','solapiKey','solapiSecret','solapiSender'].forEach(k=>save(k));
      showToast('ліөмӣҗ мҷ„лЈҢ вң“ нҷҳмһҗ '+S.patients.length+'лӘ… л¶Ҳлҹ¬мҳҙ');
      render();
    }catch(err){showToast('ліөмӣҗ мӢӨнҢЁ: '+err.message,'err');console.error(err);}
    input.value='';
  };
  reader.readAsText(file);
};

      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:8px;font-size:15px;font-weight:700" onclick="doLogin()">
        лЎңк·ёмқё
      </button>

window.doLogin=()=>{
  // Rate Limiting - 5нҡҢ мӢӨнҢЁ мӢң 30мҙҲ мһ кёҲ
  const now=Date.now();
  const failKey='doridori_login_fail';
  const lockKey='doridori_login_lock';
  try{
    const lockUntil=+localStorage.getItem(lockKey)||0;
    if(lockUntil>now){
      const sec=Math.ceil((lockUntil-now)/1000);
      const errEl=document.getElementById('login_err');
      if(errEl)errEl.textContent='вӣ” л„Ҳл¬ҙ л§Һмқҙ мӢңлҸ„н–ҲмҠөлӢҲлӢӨ. '+sec+'мҙҲ нӣ„ мһ¬мӢңлҸ„н•ҙмЈјм„ёмҡ”.';
      return;
    }
  }catch(e){}

  const email=(document.getElementById('li_email')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('li_pw')?.value||'';
  const errEl=document.getElementById('login_err');
  if(!email||!pw){
    if(errEl)errEl.textContent='мқҙл©”мқјкіј л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.';
    return;
  }
  const user=USERS.find(u=>u.email.toLowerCase()===email&&u.pw===pw);
  if(user){
    // лЎңк·ёмқё м„ұкіө - мӢӨнҢЁ м№ҙмҡҙнҠё мҙҲкё°нҷ”
    try{localStorage.removeItem(failKey);localStorage.removeItem(lockKey);}catch(e){}
    S.isLoggedIn=true;
    S.user={name:user.name,email:user.email,role:user.role};
    try{
      localStorage.setItem('doridori__loggedIn','1');
      localStorage.setItem('doridori__user',JSON.stringify(S.user));
    }catch{}
    render();
  } else {
    // мӢӨнҢЁ м№ҙмҡҙнҠё мҰқк°Җ
    try{
      const fails=(+localStorage.getItem('doridori_login_fail')||0)+1;
      localStorage.setItem('doridori_login_fail',fails);
      if(fails>=5){
        const lockUntil=Date.now()+30000; // 30мҙҲ мһ кёҲ
        localStorage.setItem('doridori_login_lock',lockUntil);
        if(errEl)errEl.textContent='вӣ” 5нҡҢ мӢӨнҢЁ! 30мҙҲ лҸҷм•Ҳ лЎңк·ёмқёмқҙ мһ к№ҒлӢҲлӢӨ.';
        return;
      }
      if(errEl)errEl.textContent='мқҙл©”мқј лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ. ('+fails+'/5нҡҢ)';
    }catch(e){
      if(errEl)errEl.textContent='мқҙл©”мқј лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ.';
    }
    const pwEl=document.getElementById('li_pw');
    if(pwEl){pwEl.style.borderColor='#dc2626';setTimeout(()=>{pwEl.style.borderColor='';},2000);}
  }
};

window.openDatePicker=function(id, triggerEl){
  var inp=document.getElementById(id);
  if(!inp)return;
  var rect=triggerEl?triggerEl.getBoundingClientRect():null;
  // inputмқ„ нҒҙлҰӯ мҡ”мҶҢ л°”лЎң мң„м—җ м •нҷ•нһҲ лҚ®м–ҙм”ҢмӣҖ (нҒ¬кё° лҸҷмқјн•ҳкІҢ)
  if(rect){
    inp.style.cssText='position:fixed;top:'+rect.top+'px;left:'+rect.left+'px;width:'+rect.width+'px;height:'+rect.height+'px;opacity:0.01;pointer-events:auto;z-index:9999;border:none;background:transparent;cursor:pointer;font-size:16px;';
  }
  inp.focus();
  try{ inp.showPicker(); }catch(e){ inp.click(); }
  // м„ нғқ мҷ„лЈҢ or м·ЁмҶҢ мӢң мҲЁк№Җ
  function hide(){
    inp.style.cssText='position:fixed;top:-300px;left:-300px;width:1px;height:1px;opacity:0;pointer-events:none;';
    inp.removeEventListener('change',hide);
    inp.removeEventListener('blur',hide);
  }
  setTimeout(function(){
    inp.addEventListener('change',hide);
    inp.addEventListener('blur',function(){setTimeout(hide,200);});
  },100);
};

var _dateBtnLock=false;
function _doDateChange(delta){
  if(_dateBtnLock)return;
  _dateBtnLock=true;
  if(delta===0) S.ledgerDate=todayStr();
  else S.ledgerDate=addDays(S.ledgerDate,delta);
  if(S.wardModal==='daily') S.wardDailyDate=S.ledgerDate;
  var e=document.getElementById('disp-dash-date');
  if(e)e.textContent=fmtNav(S.ledgerDate);
  var e2=document.getElementById('disp-ledger-date');
  if(e2)e2.textContent=fmtNav(S.ledgerDate);
  setTimeout(function(){render();_dateBtnLock=false;},50);
}
window.btnDatePrev=function(ev){if(ev){ev.preventDefault();ev.stopPropagation();}_doDateChange(-1);}
window.btnDateNext=function(ev){if(ev){ev.preventDefault();ev.stopPropagation();}_doDateChange(1);}
window.btnToday=function(ev){if(ev){ev.preventDefault();ev.stopPropagation();}_doDateChange(0);}

function init(){
  try{ loadAll(); }catch(e){ console.warn('loadAll мҳӨлҘҳ:', e); }
  try{ loadXLSX(); }catch(e){}

  if(S.supabaseUrl && S.supabaseKey){
    // Supabase мһҲмңјл©ҙ вҶ’ лЎңл”© н‘ңмӢңн•ҳкі  Supabaseм—җм„ң лЁјм Җ лЎңл“ң
    showLoading(true);
    setTimeout(function(){
      try{
        if(initSupabaseClient()){
          sbLoadAll().then(function(loaded){
            showLoading(false);
            if(loaded){
              // patientsлҠ” localStorageм—җ м ҖмһҘ м•Ҳ н•Ё (5MB мҙҲкіј л°©м§Җ)
              // лӮҳлЁём§Җл§Ң localStorageм—җ мәҗмӢң
              ['ledger','employees','schedule','messageLogs','happycalls'].forEach(function(k){
                try{localStorage.setItem('doridori_'+k,JSON.stringify(S[k]));}catch(e){}
              });
            }
            try{ render(); }catch(e){ console.error('render мҳӨлҘҳ:', e); }
          }).catch(function(e){
            showLoading(false);
            console.warn('Supabase лЎңл“ң мӢӨнҢЁ (лЎңм»¬ лҚ°мқҙн„°лЎң мӢӨн–ү):', e.message||e);
            try{ render(); }catch(e2){}
          });
        } else {
          showLoading(false);
          try{ render(); }catch(e){}
        }
      }catch(e){
        showLoading(false);
        console.warn('Supabase м—°кІ° мӢӨнҢЁ:', e.message||e);
        try{ render(); }catch(e2){}
      }
    }, 100);
  } else {
    // Supabase м—Ҷмңјл©ҙ вҶ’ лЎңм»¬ лҚ°мқҙн„°лЎң л°”лЎң н‘ңмӢң
    try{ render(); }catch(e){ console.error('render мҳӨлҘҳ:', e); }
  }
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
} else { init(); }
</script>
